<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explora Spot</title>
  <link rel="stylesheet" href="CSS/explora-spots.css" />
</head>
<body>

<header class="hero">
  <div class="socials-outer">
    <a href="https://www.instagram.com/" target="_blank">
      <img src="IMG/instagram logo.png" alt="Instagram" class="icon">
    </a>
    <a href="https://www.tiktok.com/" target="_blank">
      <img src="IMG/tiktok logo.png" alt="TikTok" class="icon">
    </a>
  </div>

  <nav class="navbar">
    <div class="nav-links">
    <a href="TABOGO SPOT PREVIEW.html?map=open" class="logo">
  <img src="IMG/Ubi.png" class="pin"> TABOGOSPOT
</a>
      <div class="divider"></div>
      <a href="TABOGO SPOT PREVIEW.html#explora-spots">Explora<br>Spots</a>
      <div class="divider"></div>
      <a href="comparte_tu_spot.html">Comparte tu spot<br>con la comunidad</a>
    </div>
  </nav>

  <a href="TABOGO SPOT PREVIEW.html" class="home-outer">
    <img src="IMG/home.png" alt="Inicio" class="icon">
  </a>
</header>

<section class="spots-section" id="spotSection"></section>

<script>
window.addEventListener("DOMContentLoaded", () => {
  const spotSection = document.getElementById("spotSection");
  const selectedSpot = JSON.parse(localStorage.getItem("selectedSpot"));
  const savedSpots = JSON.parse(localStorage.getItem("spots")) || [];

  if (!selectedSpot) {
    spotSection.innerHTML = "<p>No se encontró el spot seleccionado 😢</p>";
    return;
  }

  const spot = savedSpots.find(s => s.name === selectedSpot.name);
  if (!spot) {
    spotSection.innerHTML = "<p>No se encontró el spot 😢</p>";
    return;
  }

  const card = document.createElement("div");
  card.classList.add("spot-container");

  const visibleImages = (spot.images || []).slice(0, 3);
  let galleryHTML = "";

  visibleImages.forEach((img, i) => {
    if (i === 2 && spot.images.length > 3) {
      galleryHTML += `
        <div class="gallery-item show-more" id="showMoreBtn">
          <img src="${img}" alt="Foto ${i + 1}">
          <div class="plus-overlay">+${spot.images.length - 3}</div>
        </div>`;
    } else {
      galleryHTML += `<div class="gallery-item"><img src="${img}" alt="Foto ${i + 1}"></div>`;
    }
  });

  card.innerHTML = `
    <div class="gallery">${galleryHTML}</div>
    <div class="spot-info-wrapper">
      <h2>${spot.name}</h2>
      <p>${spot.desc}</p>
      <button onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(spot.address)}','_blank')">
        📍 ${spot.address}
      </button>
    </div>`;
  spotSection.appendChild(card);

  // Modal con carrusel
  const modal = document.createElement("div");
  modal.classList.add("modal");
  modal.innerHTML = `
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <button class="nav-btn prev-btn">&#10094;</button>
      <img src="" class="modal-img" alt="Imagen ampliada">
      <button class="nav-btn next-btn">&#10095;</button>
    </div>`;
  document.body.appendChild(modal);

  const modalImg = modal.querySelector(".modal-img");
  const closeModal = modal.querySelector(".close-modal");
  const prevBtn = modal.querySelector(".prev-btn");
  const nextBtn = modal.querySelector(".next-btn");

  let currentIndex = 0;
  const openModal = (i) => {
    currentIndex = i;
    modalImg.src = spot.images[i];
    modal.style.display = "flex";
    document.body.style.overflow = "hidden";
  };

  const changeImage = (dir) => {
    currentIndex = (currentIndex + dir + spot.images.length) % spot.images.length;
    modalImg.src = spot.images[currentIndex];
  };

  document.querySelectorAll(".gallery-item img").forEach((img, i) => {
    img.addEventListener("click", () => openModal(i));
  });

  closeModal.addEventListener("click", () => {
    modal.style.display = "none";
    document.body.style.overflow = "auto";
  });

  prevBtn.addEventListener("click", () => changeImage(-1));
  nextBtn.addEventListener("click", () => changeImage(1));

  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.style.display = "none";
      document.body.style.overflow = "auto";
    }
  });

  document.addEventListener("keydown", (e) => {
    if (modal.style.display === "flex") {
      if (e.key === "ArrowLeft") changeImage(-1);
      if (e.key === "ArrowRight") changeImage(1);
      if (e.key === "Escape") closeModal.click();
    }
  });
});
</script>
</body>
</html>
