<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tabogospot</title>

  <link rel="stylesheet" href="CSS/tabogo_csspreview.css" />

  <link href="https://fonts.googleapis.com/css2?family=montserrat:wght@600;700;900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

  <header class="hero">

    <div class="socials-outer">
      <a href="https://www.instagram.com/_nieblacorto/" target="_blank">
        <img src="img/instagram logo.png" alt="instagram" class="icon">
      </a>
      <a href="https://open.spotify.com/playlist/7efvco8gYL0aIGu0DEBUoA?si=9Ll02aUpR5KR1KizPvXCIw&pi=3EJMXfETT2asg" target="_blank">
        <img src="img/logo_spotify.png" alt="tiktok" class="icon">
      </a>
      <a href="https://niebla-7072.myshopify.com/" target="_blank">
        <img src="img/tienda_logo.jpg" alt="tiktok" class="icon">
      </a>
    </div>

    <nav class="navbar">

      <div class="nav-links">

        <a href="#" class="logo" id="togglemaplogo">
          <img src="img/ubi.png" class="pin">
          mundo niebla
        </a>

        <div class="divider"></div>

        <a href="#personajes">expedientes</a>

        <div class="divider"></div>

        <a href="comparte_tu_spot.html">
          comunidad niebla
        </a>

      </div>

      <div class="search-container">
        <input
          type="text"
          id="searchinput"
          placeholder="explora el mundo niebla"
        >

        <img
          src="img/search.png"
          class="search-icon"
          alt="buscar"
        >
      </div>

    </nav>

    <a href="#" class="home-outer">
      <img src="img/home.png" alt="inicio" class="icon">
    </a>

    <div class="mask-text">
      niebla
    </div>

  </header>

  <section>
    <div id="personajes" class="box">

      <a href="leo.html" class="slice">
        <span>leo</span>
      </a>

      <a href="abril.html" class="slice">
        <span>abril</span>
      </a>

      <a href="abrill.html" class="slice">
        <span>abrill</span>
      </a>

      <a href="paulina.html" class="slice">
        <span>paulina</span>
      </a>

    </div>
  </section>

  <section id="explora-spots" class="spots-section"></section>

  <section id="map-container">
    <div id="map"></div>
  </section>

  <script>

    const spotscontainer = document.getElementById("explora-spots");

    const searchinput = document.getElementById("searchinput");

    const mapcontainer = document.getElementById("map");

    const togglemaplogo = document.getElementById("togglemaplogo");

    let mapinitialized = false;

    let map;

    let mapvisible = false;

    // alternar mapa

    togglemaplogo.addEventListener("click", (e) => {

      e.preventDefault();

      if (!mapinitialized) {

        initmap();

        mapinitialized = true;
      }

      mapvisible = !mapvisible;

      mapcontainer.classList.toggle("visible", mapvisible);

      togglemaplogo.style.opacity = mapvisible ? "0.6" : "1";

      togglemaplogo.style.transition = "opacity 0.3s ease";

      if (mapvisible) {

        setTimeout(() => {

          map.invalidateSize();

          document
            .getElementById("map-container")
            .scrollIntoView({
              behavior: "smooth"
            });

        }, 300);
      }
    });

    // inicializar mapa

    function initmap() {

      map = L.map("map").setView(
        [4.6097, -74.0817],
        12
      );

      L.tileLayer(
        "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
        {
          attribution: "© openstreetmap contributors"
        }
      ).addTo(map);

      addmarkersfromstorage();
    }

    // cargar marcadores

    async function addmarkersfromstorage() {

      let spots =
        JSON.parse(
          localStorage.getItem("spots")
        ) || [];

      for (let spot of spots) {

        if (!spot.lat || !spot.lng) {

          try {

            const url =
              `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(spot.address)}`;

            const res = await fetch(url);

            const data = await res.json();

            if (data[0]) {

              spot.lat = parseFloat(data[0].lat);

              spot.lng = parseFloat(data[0].lon);
            }

          } catch (err) {

            console.warn(
              "no se pudo geolocalizar:",
              spot.address
            );
          }
        }
      }

      const grouped = {};

      for (let spot of spots) {

        if (spot.lat && spot.lng) {

          const key =
            `${spot.lat.toFixed(5)},${spot.lng.toFixed(5)}`;

          if (!grouped[key]) {
            grouped[key] = [];
          }

          grouped[key].push(spot);
        }
      }

      for (const key in grouped) {

        const [lat, lng] =
          key.split(",").map(Number);

        const group = grouped[key];

        let popuphtml =
          group.map(s => `
            <div
              class="popup-spot"
              onclick="verspot('${s.name}')"
            >

              <img
                src="${s.images[0]}"
                alt="${s.name}"
              >

              <div class="popup-spot-info">

                <h3>${s.name}</h3>

                <p>${s.desc}</p>

                <p class="address">
                  ${s.address}
                </p>

              </div>

            </div>
          `).join("<hr>");

        L.marker([lat, lng])
          .addTo(map)
          .bindPopup(popuphtml);
      }

      localStorage.setItem(
        "spots",
        JSON.stringify(spots)
      );
    }

    // ver spot

    function verspot(spotname) {

      const savedspots =
        JSON.parse(
          localStorage.getItem("spots")
        ) || [];

      const selected =
        savedspots.find(
          s => s.name === spotname
        );

      if (selected) {

        localStorage.setItem(
          "selectedspot",
          JSON.stringify(selected)
        );

        window.location.href =
          "explora-spots.html";

      } else {

        alert("no se encontró el spot 😢");
      }
    }

    // cargar spots

    function loadspots() {

      const savedspots =
        JSON.parse(
          localStorage.getItem("spots")
        ) || [];

      spotscontainer.innerHTML = "";

      if (savedspots.length === 0) {

        spotscontainer.innerHTML =
          "<p style='text-align:center;'>no hay spots todavía 😢</p>";

        return;
      }

      savedspots.forEach((spot, index) => {

        const card =
          document.createElement("div");

        card.classList.add("spot-card");

        card.innerHTML = `
          <button
            class="delete-btn"
            title="borrar"
          >
            🗑️
          </button>

          <img
            src="${spot.images[0]}"
            alt="${spot.name}"
          >

          <div class="spot-info">

            <h3>${spot.name}</h3>

            <p>
              ${spot.desc}
              <br>
              <strong>📍</strong>
              ${spot.address}
            </p>

          </div>
        `;

        card.addEventListener("click", (e) => {

          if (
            !e.target.classList.contains("delete-btn")
          ) {

            localStorage.setItem(
              "selectedspot",
              JSON.stringify(spot)
            );

            window.location.href =
              "explora-spots.html";
          }
        });

        card
          .querySelector(".delete-btn")
          .addEventListener("click", (e) => {

            e.stopPropagation();

            if (
              confirm(`¿eliminar "${spot.name}"?`)
            ) {

              savedspots.splice(index, 1);

              localStorage.setItem(
                "spots",
                JSON.stringify(savedspots)
              );

              loadspots();
            }
          });

        spotscontainer.appendChild(card);
      });
    }

    // búsqueda

    searchinput.addEventListener("input", (e) => {

      const term =
        e.target.value.toLowerCase();

      document
        .querySelectorAll(".spot-card")
        .forEach(card => {

          const text =
            card.textContent.toLowerCase();

          card.style.display =
            text.includes(term)
              ? ""
              : "none";
        });
    });

    loadspots();

    // abrir mapa automáticamente

    window.addEventListener(
      "DOMContentLoaded",
      () => {

        const params =
          new URLSearchParams(
            window.location.search
          );

        if (params.get("map") === "open") {

          if (!mapinitialized) {

            initmap();

            mapinitialized = true;
          }

          mapvisible = true;

          mapcontainer.classList.add("visible");

          togglemaplogo.style.opacity = "0.6";

          togglemaplogo.style.transition =
            "opacity 0.3s ease";

          setTimeout(() => {

            map.invalidateSize();

            document
              .getElementById("map-container")
              .scrollIntoView({
                behavior: "smooth"
              });

          }, 500);
        }
      }
    );

  </script>

</body>

</html>
